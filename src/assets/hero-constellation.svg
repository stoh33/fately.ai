    <text x="0" y="-140" fill="#e9f4ff" font-family="Noto Sans KR, sans-serif" font-size="26" font-weight="700" text-anchor="middle">혈액형</text>
    <g fill="#f3fafc" font-family="Noto Sans KR, sans-serif" font-size="44" font-weight="800" text-anchor="middle">
