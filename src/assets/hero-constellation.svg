    <circle r="220" fill="none" stroke="#c9a84c" stroke-opacity="0.2" stroke-width="1.5"/>
    <g stroke="#d8c287" stroke-opacity="0.48" stroke-width="1.4">
      <line x1="0" y1="-265" x2="0" y2="-220"/>
      <line x1="132.5" y1="-229.5" x2="110" y2="-190"/>
      <line x1="229.5" y1="-132.5" x2="190" y2="-110"/>
      <line x1="265" y1="0" x2="220" y2="0"/>
      <line x1="229.5" y1="132.5" x2="190" y2="110"/>
      <line x1="132.5" y1="229.5" x2="110" y2="190"/>
      <line x1="0" y1="265" x2="0" y2="220"/>
      <line x1="-132.5" y1="229.5" x2="-110" y2="190"/>
      <line x1="-229.5" y1="132.5" x2="-190" y2="110"/>
      <line x1="-265" y1="0" x2="-220" y2="0"/>
      <line x1="-229.5" y1="-132.5" x2="-190" y2="-110"/>
      <line x1="-132.5" y1="-229.5" x2="-110" y2="-190"/>
