<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Saju Integrated Insight Visual</title>
  <desc id="desc">A combined visual for Saju, zodiac, blood type and golf style.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071222"/>
      <stop offset="55%" stop-color="#10233f"/>
      <stop offset="100%" stop-color="#1b3559"/>
    </linearGradient>
    <radialGradient id="haloA" cx="22%" cy="18%" r="35%">
      <stop offset="0%" stop-color="#5fb8a5" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#5fb8a5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloB" cx="82%" cy="22%" r="35%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#haloA)"/>
  <rect width="1600" height="900" fill="url(#haloB)"/>

  <g opacity="0.65" fill="#e9f4ff" filter="url(#glow)">
    <circle cx="130" cy="94" r="2"/><circle cx="214" cy="210" r="1.8"/><circle cx="298" cy="135" r="1.9"/>
    <circle cx="410" cy="302" r="1.7"/><circle cx="540" cy="188" r="2"/><circle cx="672" cy="110" r="1.8"/>
    <circle cx="822" cy="254" r="2"/><circle cx="945" cy="148" r="1.9"/><circle cx="1066" cy="310" r="1.8"/>
    <circle cx="1192" cy="122" r="2"/><circle cx="1328" cy="236" r="1.8"/><circle cx="1470" cy="174" r="2"/>
    <circle cx="180" cy="760" r="1.9"/><circle cx="326" cy="688" r="2"/><circle cx="502" cy="806" r="1.8"/>
    <circle cx="670" cy="736" r="2"/><circle cx="860" cy="810" r="1.9"/><circle cx="1054" cy="714" r="2"/>
    <circle cx="1240" cy="804" r="1.8"/><circle cx="1408" cy="724" r="2"/>
  </g>

  <g transform="translate(800 450)">
